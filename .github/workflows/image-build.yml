name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  IMAGE_NAME: zerotier-planet
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
  ZEROTIER_REF: actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        shell: bash
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "DOCKERHUB_USERNAME is not configured. Add it as a repository Variable or Secret."
            exit 1
          fi
          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "DOCKERHUB_TOKEN is not configured. Add it as a repository Secret."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.ZEROTIER_REF }}
          build-args: |
            TAG=${{ env.ZEROTIER_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
