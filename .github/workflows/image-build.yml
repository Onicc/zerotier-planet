name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  IMAGE_NAME: zerotier-planet

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest ZeroTierOne tag
        id: zt
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(
            curl -fsSL https://api.github.com/repos/zerotier/ZeroTierOne/tags \
              | jq -r '.[].name' \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1
          )"
          echo "tag=${latest_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.zt.outputs.tag }}
          build-args: |
            TAG=${{ steps.zt.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
